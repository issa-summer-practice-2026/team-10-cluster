name: CI Pipeline

on: [push, pull_request]

permissions:
  contents: read

jobs:
  backend:
    
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Build docker image
        run: docker build -t cluster .

      - name: Test
        run: docker run --rm cluster pytest --cov=app --cov-report=xml

      - name: Boot
        run: |
          docker run -d --name app -p 8000:8000 cluster
          sleep 5
          curl --fail http://127.0.0.1:8000/health
          docker stop app


  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci    

      - name: Linting
        run: npm run lint

      - name: Type-checking
        run: npm run typecheck

      - name: Build
        run: npm run build
        
      